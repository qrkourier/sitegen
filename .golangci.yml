linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - bodyclose
    - gosec
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: true
  gosec:
    excludes:
      - G104  # unhandled errors in deferred calls
      - G304  # file inclusion via variable (expected for sitegen)

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
