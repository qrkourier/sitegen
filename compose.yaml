services:
  init-permissions:
    image: busybox:latest
    volumes:
      - site-output:/docs
    command: [ "sh", "-c", "chown -R ${PUID:-1000}:${PGID:-1000} /docs" ]

  sitegen:
    image: ghcr.io/qrkourier/sitegen:latest
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    # Run as the host user to avoid file ownership mismatches on bind
    # mounts. Set PUID and PGID in .env or export them in your shell.
    # Defaults to 1000:1000.
    user: ${PUID:-1000}:${PGID:-1000}
    ports:
      - "8080:8080"
    volumes:
      - ./content:/content:${CONTENT_VOLUME_MODE:-ro}
      - site-output:/docs
      # Mount cert.pem to persist the ACME certificate across restarts
      # and avoid hitting the issuer's rate limit. The server renews
      # automatically if the cert is within 30 days of expiry.
      # - ./cert.pem:/cert.pem
    command: [ "serve", "--src", "/content", "--out", "/docs", "--addr", ":8080" ]
    environment:
      # Set WRITE_MODE=true and CONTENT_VOLUME_MODE=rw in .env to
      # enable the markdown editor. When unset, the content volume is
      # read-only and no editor endpoints are exposed.
      - WRITE_MODE
      # Optional: OpenZiti overlay — define in .env to enable.
      # Optional: ACME TLS — define in .env to enable.
      # Also uncomment the cert.pem volume above to persist the certificate.
      - ZITI_IDENTITY
      - ZITI_SERVICE
      # Optional: zrok overlay — define in .env to enable.
      - ZROK2_ENABLE_TOKEN
      - ZROK2_API_ENDPOINT
      - ZROK2_UNIQUE_NAME
      - ZROK2_ENVIRONMENT_NAME
      - DNS_SAN
      - CLOUDFLARE_API_KEY
      - TLS_PRIVKEY
    restart: unless-stopped

volumes:
  site-output:
