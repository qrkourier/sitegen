services:
  init-permissions:
    image: busybox:latest
    volumes:
      - site-output:/docs
    command: [ "sh", "-c", "chown -R ${PUID:-1000}:${PGID:-1000} /docs" ]

  sitegen:
    image: ghcr.io/qrkourier/sitegen:latest
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    # Run as the host user to avoid file ownership mismatches on bind
    # mounts. Set PUID and PGID in .env or export them in your shell.
    # Defaults to 1000:1000.
    user: ${PUID:-1000}:${PGID:-1000}
    ports:
      - "8080:8080"
    volumes:
      - ./content:/content:ro
      - site-output:/docs
      # Mount cert.pem to persist the ACME certificate across restarts
      # and avoid hitting the issuer's rate limit. The server renews
      # automatically if the cert is within 30 days of expiry.
      # - ./cert.pem:/cert.pem
    command: [ "serve", "-src", "/content", "-out", "/docs", "-addr", ":8080" ]
    environment:
      # Optional: OpenZiti overlay — define in .env to enable.
      ZITI_IDENTITY:
      ZITI_SERVICE:
      # Optional: ACME TLS — define in .env to enable.
      # Also uncomment the cert.pem volume above to persist the certificate.
      DNS_SAN:
      CLOUDFLARE_API_KEY:
      TLS_PRIVKEY:
    restart: unless-stopped

volumes:
  site-output:
