services:
  sitegen:
    image: ghcr.io/qrkourier/sitegen:latest
    # build: .
    ports:
      - "8080:8080"
    volumes:
      - ./content:/content:ro
      - site-output:/docs
      # Mount cert.pem to persist the ACME certificate across restarts
      # and avoid hitting the issuer's rate limit. The server renews
      # automatically if the cert is within 30 days of expiry.
      # - ./cert.pem:/cert.pem
    command: ["serve", "-src", "/content", "-out", "/docs", "-addr", ":8080"]
    environment:
      # Optional: OpenZiti overlay — add these to .env or uncomment here.
      # .env is loaded automatically by docker compose.
      # ZITI_IDENTITY: "${ZITI_IDENTITY}"
      # ZITI_SERVICE: "${ZITI_SERVICE}"
      # Optional: ACME TLS — add these to .env or uncomment here.
      # Also uncomment the cert.pem volume above to persist the certificate.
      # DNS_SAN: "${DNS_SAN}"
      # CLOUDFLARE_API_KEY: "${CLOUDFLARE_API_KEY}"
      # TLS_PRIVKEY: "${TLS_PRIVKEY}"
    restart: unless-stopped

volumes:
  site-output:
