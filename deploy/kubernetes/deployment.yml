apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitegen
  namespace: sitegen
  labels:
    app: sitegen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sitegen
  template:
    metadata:
      labels:
        app: sitegen
    spec:
      containers:
        - name: sitegen
          image: ghcr.io/qrkourier/sitegen:latest
          args: ["serve", "-src", "/content", "-out", "/docs", "-addr", ":8080"]
          ports:
            - containerPort: 8080
              name: http
          env:
            # Optional: OpenZiti overlay
            # - name: ZITI_IDENTITY
            #   valueFrom:
            #     secretKeyRef:
            #       name: sitegen-ziti
            #       key: identity
            # - name: ZITI_SERVICE
            #   value: my-docs
            # Optional: ACME TLS
            # - name: DNS_SAN
            #   value: docs.example.com
            # - name: CLOUDFLARE_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: sitegen-cloudflare
            #       key: api-key
            # - name: TLS_PRIVKEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: sitegen-tls
            #       key: privkey
          volumeMounts:
            - name: content
              mountPath: /content
              readOnly: true
            - name: output
              mountPath: /docs
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: content
          configMap:
            name: sitegen-content
        - name: output
          emptyDir: {}
